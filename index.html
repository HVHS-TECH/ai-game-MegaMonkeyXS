<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sogma</title>
<link rel="stylesheet" href="Style.css">
</head>
<body>
<div class="container">
  <div class="game-panel">
    <div id="roundBanner" class="round-banner">Round 0</div>

    <div id="setupPanel" class="center-setup panel">
      <div class="setup-header">
        <div class="setup-name">
          <label for="playerName">Player Name</label>
          <input id="playerName" type="text" value="Brainiac" maxlength="16" />
        </div>
        <div class="setup-current">
          <strong id="statusWeapon">No Weapon</strong>
          <div id="statusWeaponDesc">Select your starting weapon first.</div>
        </div>
      </div>
      <div class="weapon-list" id="weaponList"></div>
      <button id="startButton" class="primary-button">Start Run</button>
    </div>

  <div class="panel canvas-panel">
    <div class="canvas-shell">
      <canvas id="gameCanvas" width="1080" height="600"></canvas>
    </div>
    <div class="hud-grid">
      <div class="hud-card">
        <strong id="statusHealth">Health 80 / 80</strong>
        <div>Stay alive.</div>
        <div class="bar"><div id="healthBar" class="bar-fill"></div></div>
      </div>
    </div>
    <div class="exp-panel">
      <div class="exp-label">Level <span id="statusLevel">1</span></div>
      <div class="bar"><div id="xpBar" class="bar-fill"></div></div>
    </div>
  </div>
  </div>
</div>

<div class="upgrade-overlay" id="upgradeOverlay">
  <div class="upgrade-panel">
    <h2>Level Up!</h2>
    <p id="upgradeText">Choose an upgrade to improve your next run.</p>
    <div class="upgrade-grid" id="upgradeOptions"></div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
